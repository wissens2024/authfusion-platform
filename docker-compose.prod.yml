# ============================================================================
# AuthFusion Platform - 운영 환경 (192.168.0.115)
# 사용: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# 도메인: sso.aines.kr → Nginx(443) → SSO Server(8081) + Admin Console(3001)
# PostgreSQL: 외부 서버(192.168.0.115) 사용, 로컬 postgres 비활성
# ============================================================================

services:
  # 로컬 PostgreSQL 비활성화 (외부 DB 사용)
  postgres:
    deploy:
      replicas: 0

  sso-server:
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # 192.168.0.115 통합 DB (sso 스키마)
      SPRING_DATASOURCE_URL: jdbc:postgresql://192.168.0.115:5432/authfusion_db?currentSchema=sso
      SPRING_DATASOURCE_USERNAME: sso_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-AuthFusion2026!}
      # 도메인
      AUTHFUSION_SSO_ISSUER: https://sso.aines.kr
      AUTHFUSION_KEY_MASTER_SECRET: ${AUTHFUSION_KEY_MASTER_SECRET:-authfusion-prod-master-key}
      AUTHFUSION_SSO_CORS_ALLOWED_ORIGINS: https://sso.aines.kr
    depends_on: []  # postgres 의존성 제거

  admin-console:
    environment:
      NEXT_PUBLIC_SSO_SERVER_URL: https://sso.aines.kr

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: authfusion-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/sso.aines.kr.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - sso-server
      - admin-console
    restart: unless-stopped
