# ============================================================================
# AuthFusion Platform - CC(Common Criteria) 모드 Docker Compose Override
# 사용: docker compose -f docker-compose.yml -f docker-compose.cc.yml up -d
# ============================================================================

services:
  sso-server:
    environment:
      # CC 하드닝 프로파일 활성화
      SPRING_PROFILES_ACTIVE: cc,docker
      # 확장 기능 비활성화
      AUTHFUSION_SSO_CC_EXTENDED_FEATURES_ENABLED: "false"
      # 마스터 키 (운영 환경에서는 별도 시크릿 관리 도구 사용)
      AUTHFUSION_KEY_MASTER_SECRET: "${AUTHFUSION_KEY_MASTER_SECRET:change-me-in-production}"

  # CC 구성에서는 Admin Console 미배포
  admin-console:
    deploy:
      replicas: 0
