# ============================================================================
# AuthFusion SSO - Nginx (OpenResty) 설정
# 도메인: sso.aines.kr (192.168.0.115)
# 위치: /usr/local/openresty/nginx/conf/nginx.conf 에 server block 추가
# 인증서: 와일드카드 *.aines.kr
# ============================================================================
#
# 라우팅 전략 (단일 도메인, 경로 기반 분기):
#
#   SSO Server (Spring Boot :8081):
#     /api/*          REST API
#     /oauth2/*       OIDC 엔드포인트
#     /.well-known/*  OIDC 디스커버리, JWKS
#     /sso/*          OIDC 로그인/MFA 페이지 (Thymeleaf)
#     /consent        동의 페이지
#     /actuator/*     헬스체크/메트릭
#     /swagger-ui/*   API 문서
#     /css/*, /js/*   SSO Server 정적 리소스
#
#   Admin Console (Next.js :3001):
#     /               대시보드
#     /login          Admin Console 로그인
#     /users, /clients, /roles, /sessions, /audit, /settings
#     /_next/*        Next.js 빌드 에셋
#
# /login 충돌 해결:
#   SSO Server OIDC 로그인: /sso/login
#   Admin Console 로그인:  /login
# ============================================================================

server {
    listen 443 ssl;
    server_name sso.aines.kr;
    server_tokens off;
    ssl_certificate /home/ju/nginx/_wildcard_.aines.kr_2025042584537.crt.pem;
    ssl_certificate_key /home/ju/nginx/_wildcard_.aines.kr_2025042584537.key.pem;

    # ==========================================================
    # SSO Server (Spring Boot :8081)
    # ==========================================================

    # REST API
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth2/OIDC 엔드포인트
    location /oauth2/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OIDC Discovery & JWKS
    location /.well-known/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSO 로그인/MFA 페이지 (Thymeleaf)
    location /sso/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSO Server 정적 리소스
    location /css/ {
        proxy_pass http://127.0.0.1:8081;
    }
    location /js/ {
        proxy_pass http://127.0.0.1:8081;
    }

    # Actuator
    location /actuator/ {
        proxy_pass http://127.0.0.1:8081;
    }

    # Swagger UI & API Docs
    location /swagger-ui {
        proxy_pass http://127.0.0.1:8081;
    }
    location /v3/api-docs {
        proxy_pass http://127.0.0.1:8081;
    }

    # ==========================================================
    # Admin Console (Next.js :3001)
    # ==========================================================

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
