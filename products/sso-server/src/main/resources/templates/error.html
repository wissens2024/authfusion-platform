<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthFusion SSO - Error</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
