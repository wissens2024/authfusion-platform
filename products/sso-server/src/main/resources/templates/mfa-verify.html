<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthFusion SSO - MFA Verification</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <h1>AuthFusion SSO</h1>
        <p>Two-Factor Authentication</p>
    </div>

    <div th:if="${error}" class="error-message" th:text="${error}"></div>

    <p style="text-align: center; margin-bottom: 1.5rem; color: #666;">
        Enter the 6-digit code from your authenticator app
    </p>

    <form method="post" th:action="@{/login/mfa}">
        <div class="form-group">
            <label for="code">Verification Code</label>
            <input type="text" id="code" name="code" required autofocus
                   placeholder="000000" maxlength="8" pattern="\d{6,8}"
                   autocomplete="one-time-code" inputmode="numeric"
                   style="text-align: center; font-size: 1.5rem; letter-spacing: 0.5rem;">
        </div>

        <input type="hidden" name="mfa_token" th:value="${mfaToken}">

        <button type="submit" class="btn-login">Verify</button>
    </form>

    <p style="text-align: center; margin-top: 1rem;">
        <a th:href="@{/login}" style="color: #4a90d9; text-decoration: none;">Back to Login</a>
    </p>
    <p style="text-align: center; margin-top: 0.5rem; font-size: 0.85rem; color: #999;">
        You can also use a recovery code
    </p>
</div>
</body>
</html>
