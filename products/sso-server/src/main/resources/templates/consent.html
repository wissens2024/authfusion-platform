<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthFusion SSO - Consent</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <h1>AuthFusion SSO</h1>
        <p>Authorization Request</p>
    </div>

    <div class="consent-info">
        <p>Application <strong th:text="${clientId}"></strong> is requesting access to:</p>
        <ul>
            <li th:each="s : ${#strings.arraySplit(scope, ' ')}" th:text="${s}"></li>
        </ul>
    </div>

    <div class="consent-actions">
        <form method="post" th:action="@{/consent}" style="display:inline">
            <input type="hidden" name="client_id" th:value="${clientId}">
            <input type="hidden" name="scope" th:value="${scope}">
            <input type="hidden" name="consent" value="approve">
            <button type="submit" class="btn-login">Allow</button>
        </form>
        <form method="post" th:action="@{/consent}" style="display:inline">
            <input type="hidden" name="consent" value="deny">
            <button type="submit" class="btn-cancel">Deny</button>
        </form>
    </div>
</div>
</body>
</html>
