spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

authfusion:
  sso:
    issuer: http://localhost:8080
    kms:
      enabled: false

logging:
  level:
    root: WARN
    com.authfusion.sso: DEBUG
