# ============================================================================
# AuthFusion Platform - 자동 배포 (192.168.0.115 / sso.aines.kr)
# ============================================================================
name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'products/sso-server/**'
      - 'products/admin-console/**'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.local/share/pnpm:$HOME/.npm-global/bin:$PATH"

            cd /home/ju/authfusion-platform
            git fetch origin main
            git reset --hard origin/main

            # ── SSO Server ──
            PID_FILE=/home/ju/authfusion-platform/sso-server.pid
            if [ -f "$PID_FILE" ]; then
              kill $(cat $PID_FILE) 2>/dev/null || true
              sleep 2
            fi
            cd products/sso-server
            mvn clean package -DskipTests -q
            setsid java -jar target/sso-server-1.0.0-SNAPSHOT.jar \
              --spring.profiles.active=prod \
              > /home/ju/authfusion-platform/sso-server.log 2>&1 &
            echo $! > $PID_FILE
            disown

            # ── Admin Console ──
            cd /home/ju/authfusion-platform/products/admin-console
            npm ci --silent
            NEXT_PUBLIC_SSO_SERVER_URL=https://sso.aines.kr npm run build
            cp -r .next/static .next/standalone/.next/static
            [ -d public ] && cp -r public .next/standalone/public
            pm2 delete authfusion-admin 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save
